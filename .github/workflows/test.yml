name: Test

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "LICENSE"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt

      - name: Run rustfmt
        run: cargo fmt --all --check

      - name: Run tests
        run: cargo test --lib

      - name: Run doctests
        run: cargo test --doc

      - name: Run clippy
        run: cargo clippy --all-targets --all-features
